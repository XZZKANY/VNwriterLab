name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: 前端检查 (lint / typecheck / test / build)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 安装依赖
        run: npm ci --legacy-peer-deps

      - name: 格式检查（Prettier）
        run: npm run format:check

      - name: 静态分析（ESLint）
        run: npm run lint

      - name: 类型检查（TypeScript）
        run: npx tsc --noEmit

      - name: 单元测试（Vitest）
        run: npm test

      - name: 生产构建（Vite）
        run: npm run build
